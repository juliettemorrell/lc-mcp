name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Unit tests
        run: python -m pytest test_units.py -v
      - name: Boot server + harness
        run: |
          nohup uvicorn server:app --host 127.0.0.1 --port 8080 > /tmp/mcp.log 2>&1 &
          for i in $(seq 1 15); do
            sleep 1
            if curl -fsS http://127.0.0.1:8080/healthz > /dev/null; then break; fi
          done
          bash test_harness.sh http://127.0.0.1:8080
      - name: Validate calculators
        run: python validate_calculators.py http://127.0.0.1:8080
